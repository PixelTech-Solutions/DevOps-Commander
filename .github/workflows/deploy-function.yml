name: "Deploy Function (Alert Receiver)"

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  # 1) Fast pre-flight gate — fail in seconds if the deploy target is missing,
  #    before spending time building wheels or logging into Azure.
  precheck:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    steps:
      - name: Validate FUNCTION_APP_NAME is set
        env:
          FUNCTION_APP_NAME: ${{ vars.FUNCTION_APP_NAME }}
        run: |
          if [ -z "$FUNCTION_APP_NAME" ]; then
            echo "::error::Repo variable FUNCTION_APP_NAME is missing." \
                 "Run the Provision workflow in DevOps-Commander-Infra first," \
                 "then copy the 'function_app_name' Terraform output into" \
                 "Settings > Variables > New repository variable."
            exit 1
          fi
          echo "Will deploy to $FUNCTION_APP_NAME"

  # 2) Build the deployment package: compile the source and vendor the Linux
  #    wheels into .python_packages, then hand it to the deploy job as an
  #    artifact so the deploy runner never rebuilds anything.
  build:
    name: Build package
    needs: precheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compile + vendor dependencies into the package
        # Vendor wheels into .python_packages so the Python v2 worker can import
        # azure.functions and index the @app.route functions (server-side Oryx
        # build is disabled in the deploy job).
        #
        # IMPORTANT: target manylinux2014 (glibc 2.17) cp311 wheels explicitly.
        # ubuntu-latest has a newer glibc, so a plain `pip install` grabs a
        # cryptography wheel whose Rust binding needs GLIBC_2.33 — which the
        # Functions Linux Consumption host lacks, causing an ImportError when
        # azure-ai-projects -> azure-storage-blob -> cryptography is imported.
        run: |
          python -m pip install --upgrade pip
          python -m py_compile function_app.py rca.py executor.py
          pip install \
            --target=".python_packages/lib/site-packages" \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.11 \
            --abi cp311 \
            --only-binary=:all: \
            --upgrade \
            -r requirements.txt

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: function-package
          # .python_packages and .funcignore are hidden; v4 skips hidden files
          # unless this is set, which would ship a package with no dependencies.
          include-hidden-files: true
          retention-days: 1
          path: |
            function_app.py
            rca.py
            executor.py
            host.json
            requirements.txt
            .funcignore
            .python_packages/
            tools/

  # 3) Deploy the pre-built package and force a function re-index, then confirm
  #    the host discovered the functions.
  deploy:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: function-package

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":       "${{ secrets.ARM_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.ARM_CLIENT_SECRET }}",
              "tenantId":       "${{ secrets.ARM_TENANT_ID }}",
              "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}"
            }

      - name: Deploy to Azure Functions (pre-built package)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.FUNCTION_APP_NAME }}
          package: .
          # Dependencies are already vendored into .python_packages, so the
          # platform must NOT rebuild. This is the recommended GitHub Actions
          # pattern for Python on Linux Consumption.
          scm-do-build-during-deployment: false
          enable-oryx-build: false

      - name: Restart + confirm discovered functions
        run: |
          APP="${{ vars.FUNCTION_APP_NAME }}"
          RG="$(az functionapp list --query "[?name=='$APP'].resourceGroup | [0]" -o tsv)"
          if [ -z "$RG" ]; then
            echo "::error::Could not locate resource group for $APP"
            exit 1
          fi
          echo "RG=$RG"

          echo "----- relevant app settings -----"
          az functionapp config appsettings list -g "$RG" -n "$APP" \
            --query "[?name=='AzureWebJobsFeatureFlags' || name=='FUNCTIONS_WORKER_RUNTIME' || name=='FUNCTIONS_EXTENSION_VERSION' || name=='WEBSITE_RUN_FROM_PACKAGE']" \
            -o table

          echo "----- linux fx version -----"
          az functionapp config show -g "$RG" -n "$APP" --query "linuxFxVersion" -o tsv

          echo "----- restarting to force function re-index -----"
          az functionapp restart -g "$RG" -n "$APP"
          sleep 45

          echo "----- discovered functions (after restart) -----"
          az functionapp function list -g "$RG" -n "$APP" -o table || echo "(none discovered)"

  # 4) Independent verification that the deployed app actually serves traffic.
  #    Public HTTP only — no Azure credentials needed in this job.
  smoke-test:
    name: Smoke test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test /api/health
        run: |
          url="https://${{ vars.FUNCTION_APP_NAME }}.azurewebsites.net/api/health"
          echo "GET $url"
          for i in $(seq 1 30); do
            code=$(curl -s -o /tmp/body -w "%{http_code}" "$url" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Healthy. Body:"
              cat /tmp/body
              exit 0
            fi
            echo "($i/30) HTTP $code — waiting for cold start..."
            sleep 6
          done
          echo "::error::Health check never returned 200"
          cat /tmp/body || true
          exit 1
